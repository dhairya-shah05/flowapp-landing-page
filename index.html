<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowApp Landing Page</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="w-screen overflow-x-hidden bg-gray-700 box-border">
    <div
        class="fixed inset-0 -z-50 bg-[linear-gradient(to_right,rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.04)_1px,transparent_1px)] bg-size-[70px_70px]">
    </div>
    <header class="w-full fixed top-0 left-0 z-50 justify-center items-center">
        <nav
            class="max-w-7xl mx-5 flex gap-5 items-center justify-between mt-5 px-5 lg:mx-auto py-2 rounded-xl bg-white/10 backdrop-blur-md border border-white/20 shadow-lg">
            <div>
                <h1 class="text-white font-semibold text-md"><span
                        class="size-5 rounded-lg mr-2 p-[5px] bg-gradient-to-br from-blue-400 to-purple-400">⚡</span>FlowApp
                </h1>
            </div>

            <div class="md:flex gap-4 items-center hidden">
                <ul class="flex gap-6 text-white">
                    <li><a href="#"
                            class="hover:bg-white/20 py-2 px-3 rounded-xl transition-all duration-300">Features</a></li>
                    <li><a href="#"
                            class="hover:bg-white/20 py-2 px-3 rounded-xl transition-all duration-300">Pricing</a></li>
                    <li><a href="#"
                            class="hover:bg-white/20 py-2 px-3 rounded-xl transition-all duration-300">Reviews</a></li>
                </ul>

                <div
                    class="p-[1px] rounded-xl bg-linear-to-r from-blue-500 to-purple-500 shadow-[0_0_10px_rgba(59,130,246,0.5)] hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] transtion-all duration-300">
                    <button
                        class="px-6 py-2 rounded-xl bg-black/90 text-white hover:bg-black/80 transition-all duration-300">Get
                        Started</button>
                </div>
            </div>

            <button class="md:hidden text-2xl text-white">
                ☰
            </button>
        </nav>
    </header>

    <main class="">
        <section class="max-w-7xl pt-50 mx-auto items-center min-h-screen px-5 lg:px-0">
            <div class="flex flex-col gap-10 lg:flex-row max-h-250">
                <div class="flex-1">
                    <div class="inline-flex items-center gap-2 text-white bg-gray-600 py-3 px-3 text-sm rounded-xl mb-10">
                        <ion-icon name="ellipse" class="size-3 text-green-400"></ion-icon>
                        <p>Now with AI powered features</p>
                        <h3 class="bg-linear-to-r from-blue-400 to-purple-500 px-3 py-1 rounded-full items-center text-xs">NEW</h3>
                    </div>

                    <div>
                        <h1 class="text-5xl mb-5 text-white font-bold tracking-wide md:text-7xl">Build products <br><span class="text-blue-500">users love</span></h1>
                        <p class="mt-5 text-white text-xl lg:text-2xl mb-5">The all-in-one platform for teams to collaborate,<br> design, and ship amazing products 10x
                            faster.</p>
                    </div>

                    <div class="inline-flex gap-5 mt-5">
                        <div class="p-[1px] rounded-xl bg-linear-to-r from-blue-500 to-purple-500 shadow-[0_0_10px_rgba(59,130,246,0.5)] hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] transition-all duration-300">
                            <button class="text-white cursor-pointer px-3 py-3 bg-linear-to-r from-cyan-600 to-purple-500 flex items-center rounded-lg">Start Free Trial <ion-icon name="arrow-forward-outline" class="ml-2 text-xl"></ion-icon></button>
                        </div>
                        <button class="text-white px-3 cursor-pointer py-3 bg-black/20 border-2 border-gray-50/20 rounded-lg flex items-center shadow-md shadow-white"><ion-icon name="play-circle-sharp" class="mr-2 text-xl"></ion-icon>Watch Demo</button>
                    </div>

                    <div class="flex items-center gap-10 mt-5">
                        <div class="relative w-32 h-10">
                            <img src="images/person 1.jpg" alt=""
                                class="size-9 rounded-full bg-cover hover:scale-110 hover:z-10 absolute transition-all duration-300">
                            <img src="images/person 2.jpg" alt=""
                                class="size-9 bg-cover rounded-full hover:z-10 hover:scale-110 transition-all duration-300 absolute left-7">
                            <img src="images/person 3.jpg" alt=""
                                class="size-9 bg-cover rounded-full hover:z-10 hover:scale-110 transition-all duration-300 absolute left-14">
                            <span
                                class="size-9 rounded-full bg-linear-to-r from-blue-400 to-purple-400 absolute left-21 text-sm text-center align-middle flex items-center p-1 text-white">+2K</span>
                        </div>

                        <div class="flex-1 items-start">
                            <div class="">
                                <ion-icon name="star"></ion-icon>
                                <ion-icon name="star"></ion-icon>
                                <ion-icon name="star"></ion-icon>
                                <ion-icon name="star"></ion-icon>
                                <ion-icon name="star"></ion-icon>
                                <span>4.9/5</span>
                            </div>

                            <p class="">Trusted by 2000+ teams worldwide.</p>
                        </div>
                    </div>
                </div>

                <div class="flex-1 justify-center items-center w-full">
                    <img src="images/charlesdeluvio-Lks7vei-eAg-unsplash.jpg" alt="" class="w-4xl max-h-[400px]">
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
